<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon SmartBiz Uploader - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .header-actions { display: flex; align-items: center; gap: 1rem; }
        .tab-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 1rem; }
        .tab-btn { padding: 0.5rem 1rem; background: none; border: none; font-size: 1rem; font-weight: 500; cursor: pointer; color: #666; }
        .tab-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .flex-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .upload-card { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px dashed var(--border-color); margin-bottom: 2rem; }
        .add-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 2rem; }
        .add-form input, .add-form select { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
        .draft-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .sheet-name-group { display: flex; gap: 1rem; align-items: center; }
        .sheet-name-group input { padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; width: 250px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                <h1>SmartBiz Uploader</h1>
            </div>
            <div class="header-actions">
                <span id="user-greeting">Admin</span>
                <button id="logout-btn" class="secondary-btn">Logout</button>
            </div>
        </header>

        <main>
            <div class="tab-buttons">
                <button class="tab-btn active" data-target="draft-tab">Current Draft</button>
                <button class="tab-btn" data-target="history-tab">History</button>
            </div>

            <!-- DRAFT TAB -->
            <div id="draft-tab" class="tab-content active">
                
                <!-- Bulk Upload Section -->
                <div class="upload-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0; color: var(--text-primary);">Bulk Upload (Excel Template)</h3>
                        <button id="download-template-btn" class="secondary-btn" style="font-size: 0.9rem;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 4px; vertical-align: middle;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download Template
                        </button>
                    </div>
                    <p style="margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem;">Upload a filled template to instantly populate your draft.</p>
                    <div class="flex-row">
                        <input type="file" id="excel-upload" accept=".xlsx, .xls">
                        <button id="upload-btn" class="primary-btn">Upload to Draft</button>
                    </div>
                </div>

                <!-- Add Single Item Section -->
                <h3>Add Item Manually</h3>
                <form id="add-item-form" class="add-form">
                    <div><label>Link / ASIN *</label><input type="text" id="add-url" required></div>
                    <div><label>Custom SKU</label><input type="text" id="add-sku"></div>
                    <div>
                        <label>Business Cat *</label>
                        <select id="add-business-cat" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="APPLIANCES">APPLIANCES</option>
                            <option value="BABY">BABY</option>
                            <option value="BEAUTY_AND_PERSONAL_CARE">BEAUTY_AND_PERSONAL_CARE</option>
                            <option value="BOOKS_AND_STATIONERY">BOOKS_AND_STATIONERY</option>
                            <option value="CLOTHING">CLOTHING</option>
                            <option value="ELECTRONICS">ELECTRONICS</option>
                            <option value="FOOD_AND_GROCERY">FOOD_AND_GROCERY</option>
                            <option value="FOOTWEAR">FOOTWEAR</option>
                            <option value="FURNITURE">FURNITURE</option>
                            <option value="GENERAL">GENERAL</option>
                            <option value="HEALTH_SUPPLEMENTS">HEALTH_SUPPLEMENTS</option>
                            <option value="HOME_CARE">HOME_CARE</option>
                            <option value="HOME_AND_KITCHEN">HOME_AND_KITCHEN</option>
                            <option value="JEWELRY">JEWELRY</option>
                            <option value="LAWN_AND_GARDEN">LAWN_AND_GARDEN</option>
                            <option value="LUGGAGE_AND_BAGS">LUGGAGE_AND_BAGS</option>
                            <option value="MULTIPURPOSE">MULTIPURPOSE</option>
                            <option value="PET_PRODUCTS">PET_PRODUCTS</option>
                            <option value="SPORTS_AND_FITNESS">SPORTS_AND_FITNESS</option>
                            <option value="TOYS_AND_GAMES">TOYS_AND_GAMES</option>
                            <option value="WATCHES">WATCHES</option>
                        </select>
                    </div>
                    <div><label>Product Cat *</label><input type="text" id="add-product-cat" required></div>
                    <div><label>Variant Rel.</label><select id="add-variant"><option value="">None</option><option value="Parent">Parent</option><option value="Child">Child</option></select></div>
                    <div><label>Size</label><input type="text" id="add-size"></div>
                    <div><label>Color</label><input type="text" id="add-color"></div>
                    <div><label>Best Seller</label><select id="add-best-seller"><option value="No">No</option><option value="Yes">Yes</option></select></div>
                    <div style="display: flex; align-items: flex-end;">
                        <button type="submit" class="primary-btn" style="width: 100%;">+ Add</button>
                    </div>
                </form>

                <!-- Draft Table -->
                <div class="section-header">
                    <h2>Current Draft Items (<span id="draft-count">0</span>)</h2>
                    <button id="clear-draft-btn" class="secondary-btn" style="color: #e74c3c; border-color: #e74c3c;">Clear Draft</button>
                </div>
                <div class="table-responsive">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>URL / ASIN</th>
                                <th>Custom SKU</th>
                                <th>Category</th>
                                <th>Variant</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="draft-table-body">
                            <!-- Draft items go here -->
                        </tbody>
                    </table>
                </div>

                <div class="draft-footer">
                    <div class="sheet-name-group">
                        <label><strong>Final Sheet Name:</strong></label>
                        <input type="text" id="sheet-name" placeholder="e.g. Batch_15_July">
                    </div>
                    <button id="generate-btn" class="primary-btn">
                        <span class="btn-text">Generate Excel</span>
                        <div class="spinner hidden"></div>
                    </button>
                </div>
            </div>

            <!-- HISTORY TAB -->
            <div id="history-tab" class="tab-content">
                <h2>Generated Sheets History</h2>
                <div class="table-responsive" style="margin-top: 1rem;">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Sheet Name</th>
                                <th>Date Generated</th>
                                <th>Items</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <!-- History items go here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
